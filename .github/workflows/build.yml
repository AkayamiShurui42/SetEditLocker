name: SetEditLocker CI Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Install NDK 29
      run: |
        ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;29.0.13113456"
        echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/29.0.13113456" >> $GITHUB_ENV

    - name: Install CMake 3.31
      run: |
        ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "cmake;3.31.0"

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew
      working-directory: .

    - name: Build Project
      run: ./gradlew :app:assembleDebug --no-daemon --stacktrace
      working-directory: .

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: SetEditLocker-Debug
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: error